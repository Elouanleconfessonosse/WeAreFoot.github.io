 async function ajouterjoueur(joueurs) {
    const verif = await get(child(dbref, 'coach/' + idCoach + '/equipe/nombredejoueur'));
    const containerjoeuur = document.querySelector(".containerjoueur");
    const nomequipe = await get(child(dbref, 'coach/' + idCoach + '/equipe/nom'));
    const nomequipeVal = nomequipe.val();
    let placesRestantes = verif.val(); 

    const joueursequipe = await get(child(dbref, 'coach/' + idCoach + '/equipe/Joueurs'));
    const joueursEquipe = joueursequipe.val() || {};
        const dejaDansEquipe = Object.values(joueursEquipe).some(joueur => joueur.joueur === joueurs);
        if (dejaDansEquipe) {
            informationErreur("Le joueur " + joueurs + " est déjà dans votre équipe.");
            return;
        }

    if (placesRestantes <= 0) {
        informationErreur("Votre équipe est pleine !");
        containerjoeuur.style.display = "none";
        return; 
    }
    const nouveauNombre = placesRestantes - 1;
    
    const donnees = {
        joueur: joueurs
    };
    push(ref(database, 'coach/' + idCoach + '/equipe/Joueurs'), donnees);
    set(ref(database, 'coach/' + idCoach + '/equipe/nombredejoueur'), nouveauNombre);
    set(ref(database, 'utilisateurs/' + joueurs + '/equipe'), nomequipeVal);
    informationErreur("Le joueur " + joueurs + " a été ajouté à votre équipe.");
    document.getElementById("joueur").value = "";
    
}

async function inscrireTournoi(idOrga,format) {
    const nom = await get(child(dbref, "coach/" + idCoach + "/equipe/nom"));
    const nomEquipe = nom.val();
    const tournoicoach = await get(child(dbref,"coach/" + idCoach + "/tournoiInscrit"))
    const tournoiCoach = tournoicoach.val();
    const formatcoach = await get(child(dbref,"coach/" + idCoach + "/equipe/format"))
    const utilisateurs = await get(child(dbref,"utilisateurs/"));
    const nbreequipetournoi = await get(child(dbref,"organisateurs/" + idOrga + "/tournoi/nombreEquipes"));
    const nbreequipetournoival = nbreequipetournoi.val();
    const utilisateursval = utilisateurs.val();
    const formatCoach = formatcoach.val();
    if(tournoiCoach === true){
        informationErreur("Vous êtes déjà inscrit à un tournoi !");
        return;
    }
    if(nbreequipetournoival <= 0){
        informationErreur("Le tournoi est complet !");
        return;
    }
    if (formatCoach !== format){
        informationErreur("Le format de votre équipe n'est pas adapté à ce tournoi.");
        return;
    }
    const donnée = {
        coach: idCoach,
        equipe: nomEquipe

    }
    await set(ref(database, "organisateurs/" + idOrga + "/tournoi/inscriptions/" + idCoach), donnée);
    await set(ref(database, "coach/" + idCoach + "/tournoiInscrit"), true)
    await set(ref(database, "organisateurs/" + idOrga + "/tournoi/nombreEquipes"), nbreequipetournoival - 1);
    const données = {
        but: 0,
        cartonrouge: 0,
        cartonjaune: 0,
        passedecissive: 0,

    }
    for(let joueur in utilisateursval){
        const j = utilisateursval[joueur];
        if(j.equipe === nomEquipe){
            await set(ref(database,"utilisateurs/" + joueur + "/stat/"),données);
        }
    }
    informationErreur("Inscription réussie !");
    chargertournois();
}

async function classement(type = "but") {
  const classementdiv = document.querySelector(".classement");
  const listejoueur = await get(child(dbref, "utilisateurs/"));
  const listejoueurval = listejoueur.val() || {};
  const listejoueurcoach = await get(child(dbref,"coach/" + idCoach + "/equipe/Joueurs/"));
  const listejoueurcoachval = listejoueurcoach.val();

  classementdiv.innerHTML = `<div class="classement-liste">
    <h1>Classement</h1>
    <button id="classement-but" onclick="classement('but')">Meilleur buteur</button>
    <button id="classement-passe" onclick="classement('passe')">Meilleur passeur</button>
    <button id="classement-cartonrouge" onclick="classement('cartonrouge')">Plus grand nombre de carton rouge</button>
    <button id="classement-cartonjaune" onclick="classement('cartonjaune')" style="margin-bottom:40px;">Plus grand nombre de carton jaune</button>
    </div>`;
  const liste = classementdiv.querySelector(".classement-liste");
  const idBoutonActif = "classement-" + type;
  const boutonActif = document.getElementById(idBoutonActif);
  boutonActif.classList.add("actif");

  let tableaujoueurbut = [];
  let tableaujoueurpasse = [];
  let tableaujoueurcartonrouge = [];
  let tableaujoueurcartonjaune = [];
  let index = [0,"👑","🥈","🥉"];
  for (const joueur in listejoueurval) {
    tableaujoueurbut.push([joueur, listejoueurval[joueur].stat?.but || 0]);
    tableaujoueurpasse.push([joueur, listejoueurval[joueur].stat?.passedecissive || 0]);
    tableaujoueurcartonrouge.push([joueur, listejoueurval[joueur].stat?.cartonrouge || 0]);
    tableaujoueurcartonjaune.push([joueur, listejoueurval[joueur].stat?.cartonjaune || 0]);
  }

  tableaujoueurbut.sort((a, b) => b[1] - a[1]);
  tableaujoueurpasse.sort((a, b) => b[1] - a[1]);
  tableaujoueurcartonrouge.sort((a, b) => b[1] - a[1]);
  tableaujoueurcartonjaune.sort((a, b) => b[1] - a[1]);
  let types = ["but", "passe", "cartonrouge", "cartonjaune"];
  let tableau = [tableaujoueurbut, tableaujoueurpasse, tableaujoueurcartonrouge, tableaujoueurcartonjaune];
  let emojie = ["⚽","👟","🟥","🟨"];
  for(let idx in tableau){
    if(type === types[idx]){
        for (let i = 0; i < tableau[idx].length && i < 10; i++) {
        const rang = i + 1;
        for(let joueurcoach in listejoueurcoachval){
            if(listejoueurcoachval[joueurcoach].joueur === tableau[idx][i][0]){
             liste.innerHTML += `
                <div class="classement-liste-joueur" data-rang="${rang}">
                    <span class="rang">${index[rang] || rang}</span><span class="nom">${tableau[idx][i][0]}</span><span class="buts">${tableau[idx][i][1]} ${emojie[idx]}</span>
                </div>`;
  }
}
  }
}
  }
}
