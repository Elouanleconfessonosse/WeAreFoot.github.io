    <script>
        let indexActu = 0
        const actualites = [
    {
        info: "Real Madrid 🆚 FC Barcelone 🔥",
        image: "https://d1csarkz8obe9u.cloudfront.net/posterpreviews/barcacelona-vs-real-madrid-flyer-template-design-a710430caf605c3d3cd3a2ad08ebe068_screen.jpg?ts=1680705199"
    },
    {
        info: "But décisif de Jude Bellingham ⚽👑",
        image: "https://www.lequipe.fr/_medias/img-photo-jpg/le-milieu-de-terrain-du-real-madrid-jude-bellingham-lors-du-match-de-liga-contre-osasuna-le-7-octobr/1500000001851041/374:13,1668:1308-828-828-75/a0479.jpg"
    },
    {
        info: "Carton rouge du capitaine 🟥😱",
        image: "https://assets-fr.imgfoot.com/media/cache/1200x1200/ramos-seville.jpg"
    },
    {
        info: "Victoire du Real Madrid au Bernabéu 🏟️🤍",
        image: "https://preview.redd.it/santiago-bernabeu-amazing-v0-jo7oeumy43wc1.jpg?width=640&crop=smart&auto=webp&s=9e8db02d504f05964be72e74568ffb161b608613"
    },
    {
        info: "Mbappé en feu cette saison 🚀⚡",
        image: "https://www.lequipe.fr/_medias/img-photo-jpg/kylian-mbappe-celebre-son-but-qui-a-scelle-la-victoire-du-real-contre-l-espanyol-2-0-manu-fernandez-/1500000002276241/627:39,1921:1333-828-828-75/6cb71.jpg"
    },
    {
        info: "Arrêt incroyable de Courtois 🧤🦾",
        image: "https://www.lequipe.fr/_medias/img-photo-jpg/thibaut-courtois-apres-la-qualification-du-real-madrid-face-au-psg-en-huitiemes-de-finale-de-la-ligue-des-champions-a-reau-presse-sports/1500000001647551/450:298,1471:1319-828-828-75/ac884"
    },
    {
        info: "Ambiance folle avant le match 🎶🔥",
        image: "https://www.leparisien.fr/resizer/IB2cIzM8lV1x5pMv0GE-izxTIHQ=/622x434/cloudfront-eu-central-1.images.arcpublishing.com/leparisien/J4ACQG3355FT3HLH3ZP7TL32EY.jpg"
    },
    {
        info: "Rodrygo décisif en fin de match ⏱️⚽",
        image: "https://assets-fr.imgfoot.com/media/cache/1200x1200/rodrygo-2425.jpg"
    }
];
function changerActualite() {
  const titreActu = document.querySelector(".actu h1");
  const imageActu = document.querySelector(".actu img");
  imageActu.classList.add("anim");
  setTimeout(() => {
    titreActu.textContent = actualites[indexActu].info;
    imageActu.src = actualites[indexActu].image;
    imageActu.classList.remove("anim");
  }, 600);
}

function actuPrecedente() {
  indexActu = (indexActu - 1 + actualites.length) % actualites.length;
  changerActualite();
}

function actuSuivante() {
  indexActu = (indexActu + 1) % actualites.length;
  changerActualite();
}

setInterval(actuSuivante, 4000);
</script>
