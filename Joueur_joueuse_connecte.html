async function classement(type = "but") {
  const classementdiv = document.querySelector(".classement");
  const listejoueur = await get(child(dbref, "utilisateurs/"));
  const listejoueurval = listejoueur.val() || {};
  document.querySelector(".fond").style.display = "block";
  classementdiv.innerHTML = `<div class="classement-liste">
    <h1>Classement</h1>
    <button id="classement-but" onclick="classement('but')">Meilleur buteur</button>
    <button id="classement-passe" onclick="classement('passe')">Meilleur passeur</button>
    <button id="classement-cartonrouge" onclick="classement('cartonrouge')">Plus grand nombre de carton rouge</button>
    <button id="classement-cartonjaune" onclick="classement('cartonjaune')" style="margin-bottom:40px;">Plus grand nombre de carton jaune</button>
    </div>`;
  const liste = classementdiv.querySelector(".classement-liste");
  const idBoutonActif = "classement-" + type;
  const boutonActif = document.getElementById(idBoutonActif);
  boutonActif.classList.add("actif");

  let tableaujoueurbut = [];
  let tableaujoueurpasse = [];
  let tableaujoueurcartonrouge = [];
  let tableaujoueurcartonjaune = [];
  let index = [0,"👑","🥈","🥉",4,5,6,7,8,9,10];
  for (const joueur in listejoueurval) {
    tableaujoueurbut.push([joueur, listejoueurval[joueur].stat?.but || 0]);
    tableaujoueurpasse.push([joueur, listejoueurval[joueur].stat?.passedecissive || 0]);
    tableaujoueurcartonrouge.push([joueur, listejoueurval[joueur].stat?.cartonrouge || 0]);
    tableaujoueurcartonjaune.push([joueur, listejoueurval[joueur].stat?.cartonjaune || 0]);
  }

  tableaujoueurbut.sort((a, b) => b[1] - a[1]);
  tableaujoueurpasse.sort((a, b) => b[1] - a[1]);
  tableaujoueurcartonrouge.sort((a, b) => b[1] - a[1]);
  tableaujoueurcartonjaune.sort((a, b) => b[1] - a[1]);
  let types = ["but", "passe", "cartonrouge", "cartonjaune"];
  let tableau = [tableaujoueurbut, tableaujoueurpasse, tableaujoueurcartonrouge, tableaujoueurcartonjaune];
  let emojie = ["⚽","👟","🟥","🟨"];
  for(let idx in tableau){

  if(type === types[idx]){
  for (let i = 0; i < tableau[idx].length && i < 10; i++) {
    const rang = i + 1;
    if(tableau[idx][i][0] === joueurId){
    liste.innerHTML += `
      <div class="classement-liste-joueur" data-rang="${rang}">
        <span class="rang">${index[rang]}</span><span class="nom">Vous</span><span class="buts">${tableau[idx][i][1]} ${emojie[idx]}</span>
      </div>`;
  }else{
    liste.innerHTML += `
      <div class="classement-liste-joueur" data-rang="${rang}">
        <span class="rang">${index[rang]}</span><span class="nom">${tableau[idx][i][0]}</span><span class="buts">${tableau[idx][i][1]} ${emojie[idx]}</span>
      </div>`;
  }
}
}
  }document.querySelector(".fond").style.display = "none";
}
async function supprimerMonCompte() {
    let identifiant = joueurId;
    const user = auth.currentUser;
    if (confirm("Veux-tu vraiment supprimer ton compte définitivement ?")) {
        try {
            await remove(ref(database, "utilisateurs/" + identifiant));
            await deleteUser(user);
            window.location.href = "connexion.html";
        } catch (error) {
            console.error(error);
            if (error.code === 'auth/requires-recent-login') {
                informationErreur("Veuillez vous déconnecter et vous reconnecter avant de supprimer votre compte.");
        }
        }
    }
};

async function enregistrerMotDePasse(){
    const mdp = document.getElementById("mdp").value;
try{
    await updatePassword(auth.currentUser, mdp);
    informationErreur("Nouveau mot-de-passe enregistré");
    document.querySelector(".containerMdp").style.display ="none";
}catch(error){
    console.error(error);
    if(error.code === "auth/requires-recent-login"){
        informationErreur("Vous allez etre redirigé vers la page de connexion.");
        setTimeout(() =>{
            window.location.href = "connexion.html";
        },2000)
    }
}
}
async function enregistrerIdentifiant(){
    const id = document.getElementById("id").value;
    const emailTechnique = id.trim() + "@WeAreFoot.com";
try{    
    await set(ref(database,"utilisateurs/" + joueurId + "/identifiant"), id);
    const donneeUtilisateur = await get(child(dbref,"utilisateurs/" + joueurId));
    const donnee = donneeUtilisateur.val();
    await updateEmail(auth.currentUser, emailTechnique);
    await set(ref(database,"utilisateurs/" + id),donnee);
    await remove(ref(database,"utilisateurs/" + joueurId));
    joueurId = id;
    informationErreur("Nouvel identifiant enregistré en" + id);
    document.querySelector(".containerId").style.display ="none";
}catch(error){
    console.error(error);
    if(error.code === "auth/requires-recent-login"){
        informationErreur("Vous allez etre redirigé vers la page de connexion.");
        setTimeout(() =>{
            window.location.href = "connexion.html";
        },2000)
    }
    }
}
